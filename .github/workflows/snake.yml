name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: zimaad
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        run: |
          sudo rm -rf dist/.git
          cd dist
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b output
          git add .
          git commit -m "Generate snake"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/zimaad/zimaad.git output
