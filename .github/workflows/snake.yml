name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          github_user_name: zimaad
          outputs: |
            docs/github-contribution-grid-snake.svg
            docs/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: EndBug/add-and-commit@v9
        with:
          branch: output
          add: docs/
          message: "Generate snake"
          push: origin output --set-upstream --force
